name: Deploy to Apify

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.actor/**'
      - 'Dockerfile'
      - 'package*.json'
      - 'tsconfig.json'
      - 'README.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.APIFY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Push Actor to Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: npx apify-cli push --build
