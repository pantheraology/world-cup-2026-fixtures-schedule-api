name: Verify and Deploy to Apify

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.actor/**'
      - 'Dockerfile'
      - 'package*.json'
      - 'tsconfig.json'
      - 'README.md'
      - '.github/workflows/deploy-apify.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Push Actor to Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          test -n "$APIFY_TOKEN" || { echo "APIFY_TOKEN repository secret is missing"; exit 1; }
          npx apify-cli push --build
